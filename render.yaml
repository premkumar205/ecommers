services:
  # Backend FastAPI service
  - type: web
    name: pjt-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 8000

  # Frontend Vite Service (Static Site)
  - type: web
    name: pjt-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pjt-backend
          property: host
    routingRules:
      - route: /*
        rewritePath: /index.html
