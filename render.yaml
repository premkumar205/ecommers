services:
  # Backend FastAPI service
  - type: web
    name: pjt-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Adjust as needed
      - key: PORT
        value: 8000

  # Frontend Vite Service (Static Site)
  - type: web
    name: pjt-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pjt-backend
          property: host
    routingRules:
      - route: /*
        rewritePath: /index.html
